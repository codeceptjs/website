<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 754" width="980" height="754">
  <defs>
    <filter id="ambient" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#1a1d28" flood-opacity="0.12"/>
    </filter>
    <filter id="ambientSoft" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1a1d28" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#C88800"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&amp;family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400..700&amp;display=swap');
    .kicker   { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
    .title-xl { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 32px; letter-spacing: -0.025em; font-feature-settings: 'ss01','ss02'; }
    .title    { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; font-feature-settings: 'ss01','ss02'; }
    .body     { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px; letter-spacing: -0.005em; }
    .mono-lg  { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 14px; }
    .mono     { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 13px; }
  </style>

  <g transform="translate(30, 34)">

    <!-- ═══ Scenario — what you write: build data with factories, then test ═══ -->
    <path d="M0,0 L910,0 L924,-8 L14,-8 Z" fill="#FFF1D6"/>
    <path d="M910,0 L924,-8 L924,492 L910,500 Z" fill="#F5E5B0"/>
    <rect width="910" height="500" fill="#FFFBF0" filter="url(#ambient)"/>
    <text x="40" y="56" class="title-xl" fill="#111827">Scenario</text>
    <text x="230" y="56" class="body" fill="#6B7280" font-style="italic">— a test that builds data with factories</text>
    <text x="40" y="86" class="mono-lg" fill="#C88800">Scenario('post and its comments')</text>

    <!-- ── 1 · Data Generation ── -->
    <g transform="translate(40, 124)">
      <path d="M0,0 L830,0 L844,-8 L14,-8 Z" fill="#F1F5F9"/>
      <path d="M830,0 L844,-8 L844,152 L830,160 Z" fill="#E2E8F0"/>
      <rect width="830" height="160" fill="#FFFFFF" filter="url(#ambient)"/>
      <text x="24" y="46" class="title" fill="#111827">Data Generation</text>
      <text x="232" y="46" class="body" fill="#6B7280" font-style="italic">— factory builds the records</text>
      <rect x="24" y="76" width="782" height="64" rx="8" fill="#FAFAF7" stroke="#F0EDE5" stroke-width="1"/>
      <text x="40" y="100" class="mono"><tspan fill="#1F2937">const post = await </tspan><tspan fill="#C88800">I.have</tspan><tspan fill="#1F2937">('post')</tspan></text>
      <text x="40" y="122" class="mono"><tspan fill="#C88800">I.haveMultiple</tspan><tspan fill="#1F2937">('comment', 5, { postId: post.id })</tspan></text>
    </g>

    <!-- ── 2 · Test ── -->
    <g transform="translate(40, 304)">
      <path d="M0,0 L830,0 L844,-8 L14,-8 Z" fill="#F1F5F9"/>
      <path d="M830,0 L844,-8 L844,152 L830,160 Z" fill="#E2E8F0"/>
      <rect width="830" height="160" fill="#FFFFFF" filter="url(#ambient)"/>
      <text x="24" y="46" class="title" fill="#111827">Test</text>
      <text x="92" y="46" class="body" fill="#6B7280" font-style="italic">— interact with the generated data</text>
      <rect x="24" y="76" width="782" height="64" rx="8" fill="#FAFAF7" stroke="#F0EDE5" stroke-width="1"/>
      <text x="40" y="100" class="mono"><tspan fill="#C88800">I.click</tspan><tspan fill="#1F2937">(post.title)</tspan></text>
      <text x="40" y="122" class="mono"><tspan fill="#C88800">I.see</tspan><tspan fill="#1F2937">('5 comments')</tspan></text>
    </g>

    <!-- ── 3 · Cleanup — outside the Scenario; the helper deletes built records automatically ── -->
    <g transform="translate(40, 530)">
      <path d="M0,0 L830,0 L844,-8 L14,-8 Z" fill="#F1F5F9"/>
      <path d="M830,0 L844,-8 L844,152 L830,160 Z" fill="#E2E8F0"/>
      <rect width="830" height="160" fill="#FFFFFF" filter="url(#ambientSoft)"/>
      <text x="24" y="24" class="kicker" fill="#94A3B8">After · automatic</text>
      <text x="24" y="50" class="title" fill="#334155">Cleanup</text>
      <text x="130" y="50" class="body" fill="#94A3B8" font-style="italic">— the helper deletes built records</text>
      <rect x="24" y="76" width="782" height="64" rx="8" fill="#FAFAF7" stroke="#F0EDE5" stroke-width="1"/>
      <text x="40" y="100" class="mono"><tspan fill="#C88800">DELETE </tspan><tspan fill="#1F2937">/api/comments/:id</tspan></text>
      <text x="40" y="122" class="mono"><tspan fill="#C88800">DELETE </tspan><tspan fill="#1F2937">/api/posts/:id</tspan></text>
    </g>

    <!-- flow: Data Generation → Test → (after the Scenario) Cleanup -->
    <g stroke="#C88800" stroke-width="2.4" fill="none" stroke-linecap="round" marker-end="url(#arrowGold)">
      <line x1="455" y1="286" x2="455" y2="302"/>
      <line x1="455" y1="506" x2="455" y2="526"/>
    </g>
  </g>
</svg>
