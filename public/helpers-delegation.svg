<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" width="1120" height="620">
  <defs>
    <filter id="ambient" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#1a1d28" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#C88800"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&amp;family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400..700&amp;display=swap');
    .kicker  { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
    .hero    { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; letter-spacing: -0.01em; }
    .title   { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 24px; letter-spacing: -0.02em; font-feature-settings: 'ss01','ss02'; }
    .backend { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 12px; }
    .body    { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px; letter-spacing: -0.005em; }
    .mono-sm { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 13px; }
  </style>

  <!-- ═══ Hub: the actor command ═══ -->
  <g transform="translate(48, 207)">
    <path d="M0,0 L340,0 L354,-8 L14,-8 Z" fill="#F1F5F9"/>
    <path d="M340,0 L354,-8 L354,192 L340,200 Z" fill="#E2E8F0"/>
    <rect width="340" height="200" fill="#FFFFFF" filter="url(#ambient)"/>
    <text x="24" y="36" class="kicker" fill="#C88800">Your test · one API</text>
    <text x="24" y="86" class="hero" fill="#C88800">I.click()</text>
    <text x="24" y="112" class="mono-sm" fill="#9CA3AF">I.fillField()  I.see()  …</text>
    <text x="24" y="152" class="body" fill="#4B5563">Tests call the actor I, not the engine.</text>
    <text x="24" y="176" class="body" fill="#4B5563">CodeceptJS delegates to one engine:</text>
  </g>

  <!-- ═══ Engines ═══ -->
  <!-- Playwright -->
  <g transform="translate(614, 40)">
    <path d="M0,0 L450,0 L464,-8 L14,-8 Z" fill="#F1F5F9"/>
    <path d="M450,0 L464,-8 L464,112 L450,120 Z" fill="#E2E8F0"/>
    <rect width="450" height="120" fill="#FFFFFF" filter="url(#ambient)"/>
    <text x="24" y="42" class="title" fill="#111827">Playwright</text>
    <text x="24" y="66" class="backend" fill="#64748B">Chromium · Firefox · WebKit</text>
    <text x="24" y="92" class="body" fill="#4B5563">Auto-waiting &amp; network mocking — the modern default.</text>
  </g>
  <!-- WebDriver -->
  <g transform="translate(614, 178)">
    <path d="M0,0 L450,0 L464,-8 L14,-8 Z" fill="#F1F5F9"/>
    <path d="M450,0 L464,-8 L464,112 L450,120 Z" fill="#E2E8F0"/>
    <rect width="450" height="120" fill="#FFFFFF" filter="url(#ambient)"/>
    <text x="24" y="42" class="title" fill="#111827">WebDriver</text>
    <text x="24" y="66" class="backend" fill="#64748B">W3C WebDriver protocol</text>
    <text x="24" y="92" class="body" fill="#4B5563">Runs on Selenium Grid and cloud vendors — broadest reach.</text>
  </g>
  <!-- Puppeteer -->
  <g transform="translate(614, 316)">
    <path d="M0,0 L450,0 L464,-8 L14,-8 Z" fill="#F1F5F9"/>
    <path d="M450,0 L464,-8 L464,112 L450,120 Z" fill="#E2E8F0"/>
    <rect width="450" height="120" fill="#FFFFFF" filter="url(#ambient)"/>
    <text x="24" y="42" class="title" fill="#111827">Puppeteer</text>
    <text x="24" y="66" class="backend" fill="#64748B">Chromium via DevTools Protocol</text>
    <text x="24" y="92" class="body" fill="#4B5563">Lightweight and fast — Chrome-only, minimal setup.</text>
  </g>
  <!-- Appium -->
  <g transform="translate(614, 454)">
    <path d="M0,0 L450,0 L464,-8 L14,-8 Z" fill="#F1F5F9"/>
    <path d="M450,0 L464,-8 L464,112 L450,120 Z" fill="#E2E8F0"/>
    <rect width="450" height="120" fill="#FFFFFF" filter="url(#ambient)"/>
    <text x="24" y="42" class="title" fill="#111827">Appium</text>
    <text x="24" y="66" class="backend" fill="#64748B">iOS &amp; Android apps</text>
    <text x="24" y="92" class="body" fill="#4B5563">Real mobile devices, the same I.* API.</text>
  </g>

  <!-- ═══ Delegation arrows (fan out from the actor) ═══ -->
  <g stroke="#C88800" stroke-width="2.4" fill="none" stroke-linecap="round" marker-end="url(#arrowGold)">
    <line x1="406" y1="307" x2="610" y2="100"/>
    <line x1="406" y1="307" x2="610" y2="238"/>
    <line x1="406" y1="307" x2="610" y2="376"/>
    <line x1="406" y1="307" x2="610" y2="514"/>
  </g>
</svg>
