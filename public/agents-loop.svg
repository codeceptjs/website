<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 480" width="1700" height="480">
  <defs>
    <filter id="ambient" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#1a1d28" flood-opacity="0.12"/>
    </filter>
    <filter id="goldShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#C88800" flood-opacity="0.32"/>
    </filter>

    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#C88800"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#C88800"/>
    </marker>

    <symbol id="icon-rocket" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 4 Q34 14 34 26 L34 36 L14 36 L14 26 Q14 14 24 4 Z"/>
      <circle cx="24" cy="20" r="3.5"/>
      <path d="M14 32 L8 36 L8 44 L18 40"/>
      <path d="M34 32 L40 36 L40 44 L30 40"/>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="20" cy="20" r="13"/>
      <line x1="30" y1="30" x2="42" y2="42"/>
    </symbol>
    <symbol id="icon-code" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16,14 6,24 16,34"/>
      <polyline points="32,14 42,24 32,34"/>
      <line x1="28" y1="8" x2="20" y2="40"/>
    </symbol>
    <symbol id="icon-check-list" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6,14 11,19 20,8"/>
      <polyline points="6,28 11,33 20,22"/>
      <polyline points="6,42 11,47 20,36"/>
      <line x1="26" y1="14" x2="44" y2="14"/>
      <line x1="26" y1="28" x2="44" y2="28"/>
      <line x1="26" y1="42" x2="38" y2="42"/>
    </symbol>
    <symbol id="icon-file-text" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 4 L30 4 L40 14 L40 44 L10 44 Z"/>
      <polyline points="30,4 30,14 40,14"/>
      <line x1="16" y1="22" x2="34" y2="22"/>
      <line x1="16" y1="30" x2="34" y2="30"/>
      <line x1="16" y1="38" x2="26" y2="38"/>
    </symbol>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&amp;family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500;600;700&amp;display=swap');
    .kicker     { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11.5px; letter-spacing: 0.22em; text-transform: uppercase; }
    .title      { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 27px; letter-spacing: -0.025em; font-feature-settings: 'ss01','ss02'; }
    .body       { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: -0.005em; }
    .loop-label { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase; }
  </style>

  <!-- Card 1 — Open -->
  <g transform="translate(96, 50)">
    <path d="M0,0 L268,0 L282,-8 L14,-8 Z" fill="#F1F5F9"/>
    <path d="M268,0 L282,-8 L282,272 L268,280 Z" fill="#E2E8F0"/>
    <rect width="268" height="280" fill="#FFFFFF" filter="url(#ambient)"/>
    <text x="24" y="40" class="kicker" fill="#C88800">01 · Open</text>
    <use href="#icon-rocket" x="24" y="58" width="46" height="46" color="#F2A900"/>
    <text x="24" y="152" class="title" fill="#111827">Open Page</text>
    <text x="24" y="200" class="body" fill="#4B5563">Writing a new test or</text>
    <text x="24" y="220" class="body" fill="#4B5563">pausing at a breakpoint.</text>
    <text x="24" y="252" class="body" fill="#9CA3AF" font-style="italic">Browser yields control.</text>
  </g>

  <!-- Card 2 — Read -->
  <g transform="translate(396, 50)">
    <path d="M0,0 L268,0 L282,-8 L14,-8 Z" fill="#F1F5F9"/>
    <path d="M268,0 L282,-8 L282,272 L268,280 Z" fill="#E2E8F0"/>
    <rect width="268" height="280" fill="#FFFFFF" filter="url(#ambient)"/>
    <text x="24" y="40" class="kicker" fill="#C88800">02 · Read</text>
    <use href="#icon-search" x="24" y="58" width="46" height="46" color="#F2A900"/>
    <text x="24" y="152" class="title" fill="#111827">Read Page</text>
    <text x="24" y="200" class="body" fill="#4B5563">Save HTML, ARIA,</text>
    <text x="24" y="220" class="body" fill="#4B5563">screenshot to files.</text>
    <text x="24" y="252" class="body" fill="#9CA3AF" font-style="italic">Token-efficient.</text>
  </g>

  <!-- Card 3 — Run commands -->
  <g transform="translate(696, 50)">
    <path d="M0,0 L268,0 L282,-8 L14,-8 Z" fill="#F1F5F9"/>
    <path d="M268,0 L282,-8 L282,272 L268,280 Z" fill="#E2E8F0"/>
    <rect width="268" height="280" fill="#FFFFFF" filter="url(#ambient)"/>
    <text x="24" y="40" class="kicker" fill="#C88800">03 · Try</text>
    <use href="#icon-code" x="24" y="58" width="46" height="46" color="#F2A900"/>
    <text x="24" y="152" class="title" fill="#111827">Run Commands</text>
    <text x="24" y="200" class="body" fill="#4B5563">Try I.click, I.see —</text>
    <text x="24" y="220" class="body" fill="#4B5563">live on the page.</text>
    <text x="24" y="252" class="body" fill="#9CA3AF" font-style="italic">Same syntax as tests.</text>
  </g>

  <!-- Card 4 — Verify -->
  <g transform="translate(996, 50)">
    <path d="M0,0 L268,0 L282,-8 L14,-8 Z" fill="#F1F5F9"/>
    <path d="M268,0 L282,-8 L282,272 L268,280 Z" fill="#E2E8F0"/>
    <rect width="268" height="280" fill="#FFFFFF" filter="url(#ambient)"/>
    <text x="24" y="40" class="kicker" fill="#C88800">04 · Verify</text>
    <use href="#icon-check-list" x="24" y="58" width="46" height="46" color="#F2A900"/>
    <text x="24" y="152" class="title" fill="#111827">Check State</text>
    <text x="24" y="200" class="body" fill="#4B5563">See element changes,</text>
    <text x="24" y="220" class="body" fill="#4B5563">HTML, console, XHR.</text>
    <text x="24" y="252" class="body" fill="#9CA3AF" font-style="italic">Live page feedback.</text>
  </g>

  <!-- Card 5 — Commit -->
  <g transform="translate(1296, 50)">
    <path d="M0,0 L268,0 L282,-8 L14,-8 Z" fill="#F1F5F9"/>
    <path d="M268,0 L282,-8 L282,272 L268,280 Z" fill="#E2E8F0"/>
    <rect width="268" height="280" fill="#FFFFFF" filter="url(#ambient)"/>
    <text x="24" y="40" class="kicker" fill="#C88800">05 · Keep</text>
    <use href="#icon-file-text" x="24" y="58" width="46" height="46" color="#F2A900"/>
    <text x="24" y="152" class="title" fill="#111827">Commit Line</text>
    <text x="24" y="200" class="body" fill="#4B5563">Write the verified</text>
    <text x="24" y="220" class="body" fill="#4B5563">action to the test.</text>
    <text x="24" y="252" class="body" fill="#9CA3AF" font-style="italic">Only what passed.</text>
  </g>

  <!-- Forward arrows between cards (at y=190, slightly above center) -->
  <g stroke="#C88800" stroke-width="2.2" fill="none" marker-end="url(#arrowGold)" stroke-linecap="round">
    <line x1="382" y1="186" x2="392" y2="186"/>
    <line x1="682" y1="186" x2="692" y2="186"/>
    <line x1="982" y1="186" x2="992" y2="186"/>
    <line x1="1282" y1="186" x2="1292" y2="186"/>
  </g>

  <!-- Loop-back arrow: short right-angle path (down, across, up) from card 5 → card 1 -->
  <path d="M 1430 340 L 1430 405 L 230 405 L 230 340"
        fill="none"
        stroke="#C88800"
        stroke-width="2.4"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-dasharray="6 7"
        marker-end="url(#arrowLoop)"
        opacity="0.85"/>

  <!-- Loop label pill (sits on the horizontal segment) -->
  <rect x="700" y="425" width="300" height="38" rx="19" ry="19"
        fill="#FFF6E0" stroke="#F2A900" stroke-width="1.6"/>
  <text x="850" y="450" text-anchor="middle" class="loop-label" fill="#C88800">Live Feedback Loop</text>
</svg>
