<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 670" width="980" height="670">
  <defs>
    <filter id="ambient" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#1a1d28" flood-opacity="0.12"/>
    </filter>
    <filter id="ambientSoft" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1a1d28" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#C88800"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&amp;family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400..700&amp;display=swap');
    .kicker   { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
    .title-xl { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 32px; letter-spacing: -0.025em; font-feature-settings: 'ss01','ss02'; }
    .title    { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: -0.02em; font-feature-settings: 'ss01','ss02'; }
    .body     { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px; letter-spacing: -0.005em; }
    .mono-lg  { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 14px; }
    .mono     { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 13px; }
    .mono-sm  { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 12px; }
  </style>

  <!-- ═══ Feature — required container, wraps everything ═══ -->
  <g transform="translate(30, 34)">
    <path d="M0,0 L910,0 L924,-8 L14,-8 Z" fill="#FFF1D6"/>
    <path d="M910,0 L924,-8 L924,598 L910,606 Z" fill="#F5E5B0"/>
    <rect width="910" height="606" fill="#FFFBF0" filter="url(#ambient)"/>

    <text x="40" y="44" class="kicker" fill="#C88800">Required · container</text>
    <text x="40" y="84" class="title-xl" fill="#111827">Feature</text>
    <text x="186" y="84" class="body" fill="#6B7280" font-style="italic">— one per file; wraps every scenario and hook</text>
    <text x="40" y="114" class="mono-lg" fill="#C88800">Feature('User Authentication')</text>

    <!-- ── before Scenario: BeforeSuite | Before ── -->
    <g transform="translate(40, 146)">
      <path d="M0,0 L400,0 L414,-8 L14,-8 Z" fill="#F1F5F9"/>
      <path d="M400,0 L414,-8 L414,72 L400,80 Z" fill="#E2E8F0"/>
      <rect width="400" height="80" fill="#FFFFFF" filter="url(#ambientSoft)"/>
      <text x="22" y="29" class="kicker" fill="#94A3B8">Optional · once before all</text>
      <text x="22" y="58" class="title" fill="#334155">BeforeSuite</text>
      <text x="378" y="58" class="mono-sm" fill="#64748B" text-anchor="end">BeforeSuite(({ I }) =&gt; …)</text>
    </g>
    <g transform="translate(470, 146)">
      <path d="M0,0 L400,0 L414,-8 L14,-8 Z" fill="#F1F5F9"/>
      <path d="M400,0 L414,-8 L414,72 L400,80 Z" fill="#E2E8F0"/>
      <rect width="400" height="80" fill="#FFFFFF" filter="url(#ambientSoft)"/>
      <text x="22" y="29" class="kicker" fill="#94A3B8">Optional · before each scenario</text>
      <text x="22" y="58" class="title" fill="#334155">Before</text>
      <text x="378" y="58" class="mono-sm" fill="#64748B" text-anchor="end">Before(({ I }) =&gt; …)</text>
    </g>

    <!-- ── Scenario — required, one or more ── -->
    <g transform="translate(40, 248)">
      <path d="M0,0 L830,0 L844,-8 L14,-8 Z" fill="#F1F5F9"/>
      <path d="M830,0 L844,-8 L844,210 L830,218 Z" fill="#E2E8F0"/>
      <rect width="830" height="218" fill="#FFFFFF" filter="url(#ambient)"/>
      <text x="24" y="30" class="kicker" fill="#C88800">Required · one or more</text>
      <text x="24" y="60" class="title" fill="#111827">Scenario</text>
      <text x="150" y="60" class="body" fill="#6B7280" font-style="italic">— the test itself</text>
      <rect x="24" y="76" width="782" height="128" rx="8" fill="#FAFAF7" stroke="#F0EDE5" stroke-width="1"/>
      <text x="40" y="100" class="mono"><tspan fill="#C88800">Scenario</tspan><tspan fill="#1F2937">('user logs in', ({ I }) =&gt; {</tspan></text>
      <text x="72" y="122" class="mono"><tspan fill="#C88800">I.amOnPage</tspan><tspan fill="#1F2937">('/login')</tspan></text>
      <text x="72" y="144" class="mono"><tspan fill="#C88800">I.fillField</tspan><tspan fill="#1F2937">('Email', user)</tspan></text>
      <text x="72" y="166" class="mono"><tspan fill="#C88800">I.click</tspan><tspan fill="#1F2937">('Sign In')</tspan></text>
      <text x="40" y="188" class="mono" fill="#1F2937">})</text>
    </g>

    <!-- ── after Scenario: After | AfterSuite ── -->
    <g transform="translate(40, 490)">
      <path d="M0,0 L400,0 L414,-8 L14,-8 Z" fill="#F1F5F9"/>
      <path d="M400,0 L414,-8 L414,72 L400,80 Z" fill="#E2E8F0"/>
      <rect width="400" height="80" fill="#FFFFFF" filter="url(#ambientSoft)"/>
      <text x="22" y="29" class="kicker" fill="#94A3B8">Optional · after each scenario</text>
      <text x="22" y="58" class="title" fill="#334155">After</text>
      <text x="378" y="58" class="mono-sm" fill="#64748B" text-anchor="end">After(({ I }) =&gt; …)</text>
    </g>
    <g transform="translate(470, 490)">
      <path d="M0,0 L400,0 L414,-8 L14,-8 Z" fill="#F1F5F9"/>
      <path d="M400,0 L414,-8 L414,72 L400,80 Z" fill="#E2E8F0"/>
      <rect width="400" height="80" fill="#FFFFFF" filter="url(#ambientSoft)"/>
      <text x="22" y="29" class="kicker" fill="#94A3B8">Optional · once after all</text>
      <text x="22" y="58" class="title" fill="#334155">AfterSuite</text>
      <text x="378" y="58" class="mono-sm" fill="#64748B" text-anchor="end">AfterSuite(({ I }) =&gt; …)</text>
    </g>

    <!-- flow: BeforeSuite → Before → Scenario → After → AfterSuite -->
    <g stroke="#C88800" stroke-width="2.4" fill="none" stroke-linecap="round" marker-end="url(#arrowGold)">
      <line x1="444" y1="186" x2="466" y2="186"/>
      <line x1="670" y1="230" x2="670" y2="246"/>
      <line x1="240" y1="472" x2="240" y2="488"/>
      <line x1="444" y1="530" x2="466" y2="530"/>
    </g>
  </g>
</svg>
